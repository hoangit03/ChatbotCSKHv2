# HTTPS: Reverse proxy vào ChatbotCSKHv2
server {
    listen 80;
    server_name primercrm.hextech.vn; # Thay bằng tên miền của bạn, vd: cskh.hextech.vn

    # Let's Encrypt ACME challenge (Đảm bảo đường dẫn này khớp với certbot webroot của bạn)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name primercrm.hextech.vn; # Thay bằng tên miền của bạn, vd: cskh.hextech.vn

    # SSL certificates (Thay tên miền vào đường dẫn bên dưới)
    ssl_certificate /etc/letsencrypt/live/primercrm.hextech.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/primercrm.hextech.vn/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Cho phép upload file lớn
    client_max_body_size 50M;

    # Proxy to ChatbotCSKHv2 via internal docker network
    location / {
        proxy_pass http://rag_api:8000;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support (nếu cần)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
